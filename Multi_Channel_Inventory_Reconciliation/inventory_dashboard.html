
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Audit Dashboard</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:30px}
.container{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
button{padding:10px 18px;border:none;background:#2563eb;color:#fff;border-radius:6px;cursor:pointer}
pre{background:#111;color:#0f0;padding:15px;border-radius:6px;overflow:auto;max-height:600px}
.status{margin:15px 0;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>Inventory Audit Dashboard</h1>
<p>Click the button to fetch the latest inventory data from your n8n webhook.</p>

<button onclick="loadData()">Load Inventory</button>
<div class="status" id="status"></div>

<pre id="output">No data loaded.</pre>
</div>

<script>
const WEBHOOK_URL = "https://automation.theworkflowengineer.ovh/webhook/9265bad0-09f3-410a-9280-1bed7ca862ec";

async function loadData() {
    const status = document.getElementById("status");
    const output = document.getElementById("output");

    status.textContent = "Loading...";

    try {
        const response = await fetch(WEBHOOK_URL);

        if (!response.ok) {
            throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        status.textContent = "Loaded successfully";
        output.textContent = JSON.stringify(data, null, 2);

    } catch (err) {
        status.textContent = "Error";
        output.textContent = err.message;
    }
}
</script>
</body>
</html>
